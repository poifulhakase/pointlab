<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./favicon.png" />
    <link rel="manifest" href="./manifest.json?v=1" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>ぽいロボ - シグナル</title>
    <link rel="stylesheet" href="../poinavi/style.css?v=130" />
    <link rel="stylesheet" href="./style.css?v=1" />
    <script src="./poirobo-swipe-nav.js?v=1"></script>
    <script>
      (function() {
        var theme = localStorage.getItem("poirobo_theme") || "light";
        document.documentElement.className = theme === "dark" ? "dark-mode" : "light-mode";
      })();
    </script>
    <style>
      html.light-mode { background-color: #f5f5f7; }
      html.dark-mode { background-color: #1a1a1a; }
    </style>
  </head>
  <body>
    <script>
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    </script>
    <header class="translate-header">
      <div class="translate-header__icon-btn translate-header__icon-btn--invisible"></div>
      <a href="https://note.com/pointlab/magazines" target="_blank" rel="noopener noreferrer" class="translate-header__title">
        <img src="./logo.svg" alt="ぽいロボ" class="translate-header__logo" style="height: 28px; width: auto;" />
      </a>
      <button id="settingsButton" class="translate-header__icon-btn translate-header__icon-btn--right" type="button" aria-label="設定">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <div id="settingsModal" class="translate-modal hidden">
      <div class="translate-modal__overlay"></div>
      <div class="translate-modal__content">
        <div class="translate-modal__header">
          <h2 class="translate-modal__title">設定</h2>
          <button class="translate-modal__close" id="settingsClose" aria-label="閉じる">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
        <div class="translate-modal__body">
          <div class="translate-modal__section">
            <div class="translate-modal__section-title">テーマ</div>
            <button id="themeToggle" class="translate-modal__theme-toggle">
              <span class="theme-icon">☀️</span>
              <span class="theme-text">ライトモード</span>
            </button>
          </div>
          <div class="translate-modal__section">
            <div class="translate-modal__section-title">免責事項</div>
            <div style="font-size: 0.8125rem; color: var(--text-secondary); line-height: 1.6;">
              本サービスは参考情報を提供するものです。重要な場面では専門家への相談を推奨いたします。利用により生じた損害について、運営者は一切の責任を負いません。
            </div>
          </div>
        </div>
      </div>
    </div>

    <main class="poirobo-main">
      <h1 class="visually-hidden">シグナル - アラート集約</h1>
      <p class="poirobo-section-title">アラート・シグナル（最新順）</p>
      <div id="signalList" class="poirobo-signal-list">
        <!-- モックデータで表示（将来APIから取得） -->
      </div>
    </main>

    <footer class="translate-footer">
      <a href="./lab.html" class="translate-footer__btn" aria-label="研究室ページへ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0-6v6"/>
          <circle cx="6" cy="12" r="1"/>
          <circle cx="18" cy="8" r="1"/>
          <circle cx="15" cy="16" r="1"/>
        </svg>
        <span class="translate-footer__label">研究室</span>
      </a>
      <a href="./shield.html" class="translate-footer__btn" aria-label="シールドページへ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span class="translate-footer__label">シールド</span>
      </a>
      <span class="translate-footer__btn translate-footer__btn--active" aria-label="シグナル（現在のページ）">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12h4"/>
          <path d="M6 8v8"/>
          <path d="M10 4v16"/>
          <path d="M14 8v8"/>
          <path d="M18 12h4"/>
        </svg>
        <span class="translate-footer__label">シグナル</span>
      </span>
      <a href="./index.html" class="translate-footer__btn" aria-label="ぽいロボページへ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="10" rx="2"/>
          <circle cx="8.5" cy="16" r="1"/>
          <circle cx="15.5" cy="16" r="1"/>
          <path d="M12 11V7"/>
          <path d="M7 7h10"/>
        </svg>
        <span class="translate-footer__label">ぽいロボ</span>
      </a>
    </footer>

    <script>
      (function() {
        var theme = localStorage.getItem("poirobo_theme") || "light";
        document.body.className = theme === "dark" ? "dark-mode" : "light-mode";
      })();
      document.getElementById("settingsButton").onclick = function() {
        document.getElementById("settingsModal").classList.remove("hidden");
      };
      function closeModal() {
        document.getElementById("settingsModal").classList.add("hidden");
      }
      document.getElementById("settingsClose").onclick = closeModal;
      document.querySelector("#settingsModal .translate-modal__overlay").onclick = closeModal;
      document.getElementById("themeToggle").onclick = function() {
        var t = localStorage.getItem("poirobo_theme") || "light";
        t = t === "dark" ? "light" : "dark";
        localStorage.setItem("poirobo_theme", t);
        document.documentElement.className = t === "dark" ? "dark-mode" : "light-mode";
        document.body.className = t === "dark" ? "dark-mode" : "light-mode";
        this.querySelector(".theme-icon").textContent = t === "dark" ? "🌙" : "☀️";
        this.querySelector(".theme-text").textContent = t === "dark" ? "ダークモード" : "ライトモード";
      };
      var t = localStorage.getItem("poirobo_theme") || "light";
      var btn = document.getElementById("themeToggle");
      btn.querySelector(".theme-icon").textContent = t === "dark" ? "🌙" : "☀️";
      btn.querySelector(".theme-text").textContent = t === "dark" ? "ダークモード" : "ライトモード";
      window.addEventListener("pageshow", function(e) {
        if (e.persisted) {
          var theme = localStorage.getItem("poirobo_theme") || "light";
          document.documentElement.className = theme === "dark" ? "dark-mode" : "light-mode";
          document.body.className = theme === "dark" ? "dark-mode" : "light-mode";
        }
      });

      // シグナル一覧（モック・将来はAPIから取得）
      var signalMockData = [
        { time: "10:30", source: "日経225", message: "25MA上抜け", type: "positive" },
        { time: "09:15", source: "TOPIX", message: "出来高増", type: "neutral" },
        { time: "昨日", source: "○○ETF", message: "短期均線ゴールデンクロス", type: "positive" },
        { time: "昨日", source: "外部アラート", message: "△△銘柄が決算発表", type: "caution" }
      ];
      var listEl = document.getElementById("signalList");
      var typeColors = { positive: "#16a34a", caution: "#ca8a04", neutral: "var(--text-secondary)" };
      signalMockData.forEach(function(item) {
        var card = document.createElement("div");
        card.className = "poirobo-card";
        var dotColor = typeColors[item.type] || typeColors.neutral;
        card.innerHTML =
          '<div style="display:flex;align-items:flex-start;gap:12px;">' +
          '<span style="width:8px;height:8px;border-radius:50%;background:' + dotColor + ';flex-shrink:0;margin-top:6px;"></span>' +
          '<div style="flex:1;min-width:0;">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">' +
          '<span style="font-weight:600;font-size:0.875rem;">' + item.source + '</span>' +
          '<span style="font-size:0.75rem;color:var(--text-secondary);">' + item.time + '</span>' +
          '</div>' +
          '<p style="margin:0;font-size:0.8125rem;color:var(--text-primary);line-height:1.5;">' + item.message + '</p>' +
          '</div>' +
          '</div>';
        listEl.appendChild(card);
      });
    </script>
  </body>
</html>
