    <style>
      /* FOUC対策: 初期背景色 */
      html.light-mode { background-color: #f5f5f7; }
      html.dark-mode { background-color: #1a1a1a; }
      
      /* 横スクロール防止・波紋用・キャラ下寄せ用（スクロールなし） */
      .lab-main {
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      
      /* ダッシュボードカード - 2列固定（天気・気温用） */
      .lab-dashboard {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 12px;
        width: 100%;
        box-sizing: border-box;
      }
      
      .lab-card {
        min-width: 0;
        overflow: hidden;
      }
      
      .lab-card__value {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      
      /* 歩数・移動距離パネル（結合） */
      .lab-activity-panel {
        display: flex;
        background: var(--bg-primary);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      }
      
      body.dark-mode .lab-activity-panel {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }
      
      .lab-activity-panel__item {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      
      .lab-activity-panel__divider {
        width: 1px;
        background: var(--border-color);
        margin: 0 16px;
      }
      
      .lab-activity-panel__icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
        color: #ffffff;
        flex-shrink: 0;
      }
      
      .lab-activity-panel__icon svg {
        width: 22px;
        height: 22px;
      }
      
      .lab-activity-panel__content {
        min-width: 0;
      }
      
      .lab-activity-panel__label {
        font-size: 0.75rem;
        color: var(--text-secondary);
        margin-bottom: 2px;
      }
      
      .lab-activity-panel__value {
        font-size: 1.125rem;
        font-weight: 600;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      
      /* 歩数・移動距離パネル コンテナ（オーバーレイ用） */
      .lab-activity-container {
        position: relative;
        margin-bottom: 16px;
      }
      
      .lab-activity-container .lab-activity-panel {
        margin-bottom: 0;
      }
      
      /* オーバーレイ（マスク + ボタン） */
      .lab-activity-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 16px;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 12px;
        z-index: 10;
        padding: 8px 16px;
      }
      
      .lab-activity-overlay.hidden {
        display: none;
      }
      
      .lab-activity-overlay__text {
        font-size: 0.8125rem;
        color: #ffffff;
        text-align: center;
        line-height: 1.4;
      }
      
      .lab-activity-overlay__btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        background: #00B0B9;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        font-size: 0.8125rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.1s;
      }
      
      .lab-activity-overlay__btn:hover {
        background: #009199;
      }
      
      .lab-activity-overlay__btn:active {
        transform: scale(0.96);
      }
      
      .lab-activity-overlay__btn svg {
        width: 18px;
        height: 18px;
      }
      
      /* 連携済み時の解除ボタン（パネル下に表示） */
      .lab-fitbit-disconnect {
        text-align: center;
        margin-bottom: 16px;
      }
      
      .lab-fitbit-disconnect.hidden {
        display: none;
      }
      
      .lab-fitbit-disconnect__btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 0.8125rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      
      .lab-fitbit-disconnect__btn:hover {
        background: var(--bg-secondary);
        color: #ef4444;
        border-color: #ef4444;
      }

      /* 一時非表示（天気・気温・Fitbitはデザイン改修後に再表示） */
      .lab-dashboard,
      .lab-activity-container {
        display: none !important;
      }

      /* キャラクター表示エリア（フッターとの余白・デバイスに応じて調整） */
      .lab-character {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        min-height: 100px;
        margin-top: auto;
        padding-bottom: clamp(2px, calc(var(--vvh, 100vh) * 0.006), 8px);
        contain: layout;
      }
      .lab-character {
        position: relative;
      }
      .lab-character__inner {
        display: flex;
        justify-content: center;
        align-items: flex-end;
      }
      .lab-character__professor-wrap {
        position: relative;
        display: inline-block;
        line-height: 0;
      }
      .lab-character__img {
        height: calc(var(--vvh, 100vh) * 0.432);
        width: auto;
        transform: translateY(calc(12px + 2vh));
        display: block;
        position: relative;
        z-index: 2;
      }
      body:not(.dark-mode) .lab-character__professor-wrap {
        position: static;
      }
      body.dark-mode .lab-character__professor-wrap {
        position: static;
      }
      body.dark-mode .lab-character__inner {
        justify-content: center;
      }
      body.dark-mode .lab-character__img {
        position: relative;
        z-index: 2;
      }
      /* PC・大画面：枠内に収める（博士サイズは維持、overflowでクリップ） */
      .lab-character {
        overflow: hidden;
      }
      @media (min-width: 500px) {
        .lab-character__img {
          max-height: 420px;
        }
      }
      /* 研究室メイン：固定フッター分の余白は style.css で確保（常に表示のため） */
      @media (max-height: 600px) {
        .lab-character { padding-bottom: clamp(1px, calc(var(--vvh, 100vh) * 0.004), 6px); }
      }
      @media (min-height: 900px) {
        .lab-character { padding-bottom: clamp(4px, calc(var(--vvh, 100vh) * 0.008), 12px); }
      }

      /* パーティクル：PC時に枠内に収める（max-width 500px のアプリフレームに合わせる） */
      @media (min-width: 500px) {
        .lab-particles {
          left: 50%;
          margin-left: -250px;
          width: 500px;
          right: auto;
        }
      }

      /* 波紋エフェクト（クリック・タップ時に心地よいフィードバック） */
      .lab-ripple {
        position: absolute;
        border-radius: 50%;
        background: rgba(96, 165, 250, 0.28);
        transform: scale(0);
        opacity: 1;
        pointer-events: none;
        animation: lab-ripple-anim 1s ease-out forwards;
      }
      body.dark-mode .lab-ripple {
        background: rgba(96, 165, 250, 0.2);
      }
      @keyframes lab-ripple-anim {
        to {
          transform: scale(2.5);
          opacity: 0;
        }
      }
      
    </style>

    <!-- タップ時のハカセ画像の揺れ防止（ビューポート高さを安定化） -->
    <script>
      (function(){
        function setVVH() {
          var vv = window.visualViewport;
          var h = (vv && vv.height) || window.innerHeight;
          document.documentElement.style.setProperty("--vvh", Math.round(h) + "px");
        }
        var vvhTimer;
        function debouncedSetVVH() {
          clearTimeout(vvhTimer);
          vvhTimer = setTimeout(setVVH, 50);
        }
        setVVH();
        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", debouncedSetVVH);
          window.visualViewport.addEventListener("scroll", debouncedSetVVH);
        }
        window.addEventListener("resize", debouncedSetVVH);
      })();
    </script>

    <script>
      // ============================================
      // Fitbit API設定
      // ============================================
      // ★ここにFitbit Developer Portalで取得したClient IDを設定してください
      const FITBIT_CLIENT_ID = "23Q7LM"; // 要設定
      const FITBIT_REDIRECT_URI = window.location.origin + "/poirobo/lab.html";
      const FITBIT_SCOPES = "activity";
      
      // ============================================
      // 波紋エフェクト（メインエリアのクリック・タップで心地よいフィードバック）
      // ============================================
      function initLabRipple() {
        const main = document.querySelector(".lab-main");
        if (!main) return;

        var lastRipple = 0;
        function createRipple(clientX, clientY, target) {
          if (!target || target.closest("button, a, input, select, textarea, [role='button']")) return;
          var now = Date.now();
          if (now - lastRipple < 400) return;
          lastRipple = now;
          const rect = main.getBoundingClientRect();
          const x = clientX - rect.left;
          const y = clientY - rect.top;
          const size = Math.max(rect.width, rect.height) * 0.35;

          const ripple = document.createElement("span");
          ripple.className = "lab-ripple";
          ripple.style.cssText = `left:${x - size/2}px;top:${y - size/2}px;width:${size}px;height:${size}px;`;
          main.appendChild(ripple);

          setTimeout(function() { ripple.remove(); }, 1000);
        }

        main.addEventListener("click", function(e) {
          createRipple(e.clientX, e.clientY, e.target);
        });
        main.addEventListener("touchend", function(e) {
          if (e.changedTouches && e.changedTouches[0]) {
            var t = e.changedTouches[0];
            var el = document.elementFromPoint(t.clientX, t.clientY);
            createRipple(t.clientX, t.clientY, el);
          }
        }, { passive: true });
      }

      // ============================================
      // テーマ管理
      // ============================================
      function initTheme() {
        const savedTheme = localStorage.getItem("poirobo_theme") || "light";
        applyTheme(savedTheme);
        updateThemeButton(savedTheme);
      }

      function applyTheme(theme) {
        document.documentElement.className = theme === "dark" ? "dark-mode" : "light-mode";
        document.body.className = "lab-page " + (theme === "dark" ? "dark-mode" : "light-mode");
      }

      function updateThemeButton(theme) {
        const themeToggle = document.getElementById("labThemeToggle");
        if (!themeToggle) return;
        const icon = themeToggle.querySelector(".theme-icon");
        const text = themeToggle.querySelector(".theme-text");
        if (theme === "dark") {
          icon.textContent = "🌙";
          text.textContent = "ダークモード";
        } else {
          icon.textContent = "☀️";
          text.textContent = "ライトモード";
        }
      }

      function initThemeToggle() {
        const themeToggle = document.getElementById("labThemeToggle");
        if (!themeToggle) return;
        themeToggle.addEventListener("click", function() {
          const currentTheme = localStorage.getItem("poirobo_theme") || "light";
          const newTheme = currentTheme === "dark" ? "light" : "dark";
          localStorage.setItem("poirobo_theme", newTheme);
          applyTheme(newTheme);
          updateThemeButton(newTheme);
        });
      }

      // ============================================
      // 設定モーダル
      // ============================================
      function initStartPageSelect() {
        const select = document.getElementById("labStartPageSelect");
        if (!select) return;
        const savedStartPage = localStorage.getItem("poirobo_start_page") || "index.html";
        select.value = savedStartPage;
        select.addEventListener("change", function() {
          localStorage.setItem("poirobo_start_page", this.value);
        });
      }

      function initSettingsModal() {
        const settingsButton = document.getElementById("labSettingsButton");
        const settingsModal = document.getElementById("labSettingsModal");
        const settingsClose = document.getElementById("labSettingsClose");
        const overlay = settingsModal.querySelector(".translate-modal__overlay");

        settingsButton.addEventListener("click", function() {
          settingsModal.classList.remove("hidden");
        });

        function closeModal() {
          settingsModal.classList.add("hidden");
        }

        settingsClose.addEventListener("click", closeModal);
        overlay.addEventListener("click", closeModal);
      }

      // ============================================
      // 日付・時刻表示
      // ============================================
      function updateDateTime() {
        const now = new Date();
        const timeEl = document.getElementById("labTime");
        const dateEl = document.getElementById("labDate");
        const dayEl = document.getElementById("labDay");
        
        const hours = String(now.getHours()).padStart(2, "0");
        const minutes = String(now.getMinutes()).padStart(2, "0");
        timeEl.innerHTML = `${hours[0]}${hours[1]}:<span class="lab-hero__time-min-tens">${minutes[0]}</span>${minutes[1]}`;
        
        const month = now.getMonth() + 1;
        const date = now.getDate();
        dateEl.textContent = `${month}/${date}`;
        
        const daysHiragana = ["にちようび", "げつようび", "かようび", "すいようび", "もくようび", "きんようび", "どようび"];
        const dayStr = daysHiragana[now.getDay()];
        dayEl.innerHTML = dayStr === "すいようび"
          ? '<span class="lab-hero__day-accent">すい</span><span class="lab-hero__day-rest">ようび</span>'
          : dayStr;
      }

      // ============================================
      // 天気取得（Open-Meteo API - 無料）
      // ============================================
      const weatherCodeMap = {
        0: { text: "快晴", icon: "clear" },
        1: { text: "晴れ", icon: "clear" },
        2: { text: "やや曇り", icon: "partly_cloudy" },
        3: { text: "曇り", icon: "cloudy" },
        45: { text: "霧", icon: "fog" },
        48: { text: "霧", icon: "fog" },
        51: { text: "小雨", icon: "drizzle" },
        53: { text: "雨", icon: "drizzle" },
        55: { text: "雨", icon: "drizzle" },
        61: { text: "小雨", icon: "rain" },
        63: { text: "雨", icon: "rain" },
        65: { text: "大雨", icon: "rain" },
        71: { text: "小雪", icon: "snow" },
        73: { text: "雪", icon: "snow" },
        75: { text: "大雪", icon: "snow" },
        80: { text: "にわか雨", icon: "rain" },
        81: { text: "雨", icon: "rain" },
        82: { text: "大雨", icon: "rain" },
        95: { text: "雷雨", icon: "thunderstorm" },
        96: { text: "雷雨", icon: "thunderstorm" },
        99: { text: "雷雨", icon: "thunderstorm" }
      };

      function getWeatherIcon(iconType) {
        const icons = {
          clear: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>`,
          partly_cloudy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2v2"/>
            <path d="M4.93 4.93l1.41 1.41"/>
            <path d="M20 12h2"/>
            <path d="M19.07 4.93l-1.41 1.41"/>
            <path d="M15.947 12.65a4 4 0 0 0-5.925-4.128"/>
            <path d="M13 22H7a5 5 0 1 1 4.9-6H13a3 3 0 0 1 0 6Z"/>
          </svg>`,
          cloudy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>
          </svg>`,
          fog: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 14h16"/>
            <path d="M4 18h16"/>
            <path d="M4 10h16"/>
            <path d="M4 6h16"/>
          </svg>`,
          drizzle: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/>
            <path d="M8 19v1"/>
            <path d="M8 14v1"/>
            <path d="M16 19v1"/>
            <path d="M16 14v1"/>
            <path d="M12 21v1"/>
            <path d="M12 16v1"/>
          </svg>`,
          rain: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/>
            <path d="M16 14v6"/>
            <path d="M8 14v6"/>
            <path d="M12 16v6"/>
          </svg>`,
          snow: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/>
            <path d="M8 15h.01"/>
            <path d="M8 19h.01"/>
            <path d="M12 17h.01"/>
            <path d="M12 21h.01"/>
            <path d="M16 15h.01"/>
            <path d="M16 19h.01"/>
          </svg>`,
          thunderstorm: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/>
            <path d="m9.2 22 3-7H8l4-7"/>
          </svg>`
        };
        return icons[iconType] || icons.clear;
      }

      async function fetchWeather() {
        const weatherIcon = document.getElementById("weatherIcon");
        const weatherText = document.getElementById("weatherText");
        const tempValue = document.getElementById("tempValue");

        try {
          const position = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, {
              enableHighAccuracy: false,
              timeout: 10000,
              maximumAge: 300000
            });
          });

          const { latitude, longitude } = position.coords;
          const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&timezone=Asia%2FTokyo`;
          
          const response = await fetch(url);
          const data = await response.json();
          
          const temp = Math.round(data.current.temperature_2m);
          const weatherCode = data.current.weather_code;
          const weather = weatherCodeMap[weatherCode] || { text: "不明", icon: "clear" };
          
          weatherIcon.innerHTML = getWeatherIcon(weather.icon);
          weatherText.textContent = weather.text;
          tempValue.textContent = `${temp}°C`;

        } catch (error) {
          console.error("天気取得エラー:", error);
          weatherText.textContent = "取得失敗";
          tempValue.textContent = "--°C";
        }
      }

      // ============================================
      // 移動距離（位置情報から計算）
      // ============================================
      let lastPosition = null;
      let totalDistance = 0; // メートル
      const MOVEMENT_THRESHOLD = 10; // 10m以上移動で記録

      function getTodayKey() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
      }

      function initDistanceTracking() {
        const savedData = localStorage.getItem("poirobo_distance_" + getTodayKey());
        if (savedData) {
          totalDistance = parseFloat(savedData) || 0;
        }
        updateDistanceDisplay();
        
        if (navigator.geolocation) {
          navigator.geolocation.watchPosition(
            handlePositionUpdate,
            (err) => {
              console.log("位置情報エラー:", err);
              document.getElementById("travelDistance").textContent = "非対応";
            },
            { enableHighAccuracy: true, maximumAge: 60000, timeout: 30000 }
          );
        } else {
          document.getElementById("travelDistance").textContent = "非対応";
        }
      }

      function handlePositionUpdate(position) {
        const now = Date.now();
        
        if (lastPosition) {
          const distance = calculateDistance(
            lastPosition.coords.latitude,
            lastPosition.coords.longitude,
            position.coords.latitude,
            position.coords.longitude
          );
          
          // 10m以上移動、かつ30分以内の更新のみカウント
          if (distance > MOVEMENT_THRESHOLD) {
            const timeDiff = (now - lastPosition.timestamp) / 1000 / 60;
            if (timeDiff < 30) {
              totalDistance += distance;
              localStorage.setItem("poirobo_distance_" + getTodayKey(), totalDistance);
              updateDistanceDisplay();
            }
          }
        }
        
        lastPosition = {
          coords: position.coords,
          timestamp: now
        };
        
        updateDistanceDisplay();
      }

      function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; // 地球の半径（メートル）
        const φ1 = lat1 * Math.PI / 180;
        const φ2 = lat2 * Math.PI / 180;
        const Δφ = (lat2 - lat1) * Math.PI / 180;
        const Δλ = (lon2 - lon1) * Math.PI / 180;

        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                  Math.cos(φ1) * Math.cos(φ2) *
                  Math.sin(Δλ/2) * Math.sin(Δλ/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

        return R * c;
      }

      function updateDistanceDisplay() {
        const distanceEl = document.getElementById("travelDistance");
        
        if (totalDistance >= 1000) {
          // 1km以上はkm表示
          distanceEl.textContent = `${(totalDistance / 1000).toFixed(1)}km`;
        } else {
          // 1km未満はm表示
          distanceEl.textContent = `${Math.round(totalDistance)}m`;
        }
      }

      // ============================================
      // Fitbit連携（OAuth 2.0 Implicit Grant Flow）
      // ============================================
      function initFitbit() {
        // URLハッシュからアクセストークンを取得（OAuth callback後）
        const hash = window.location.hash;
        if (hash && hash.includes("access_token")) {
          const params = new URLSearchParams(hash.substring(1));
          const accessToken = params.get("access_token");
          const expiresIn = params.get("expires_in");
          
          if (accessToken) {
            // トークンを保存
            const expiresAt = Date.now() + (parseInt(expiresIn, 10) * 1000);
            localStorage.setItem("fitbit_access_token", accessToken);
            localStorage.setItem("fitbit_expires_at", expiresAt);
            
            // URLをクリーンアップ
            history.replaceState(null, "", window.location.pathname);
            
            // 歩数を取得
            fetchFitbitSteps(accessToken);
            updateFitbitUI(true);
          }
        } else {
          // 保存済みトークンをチェック
          const savedToken = localStorage.getItem("fitbit_access_token");
          const expiresAt = localStorage.getItem("fitbit_expires_at");
          
          if (savedToken && expiresAt && Date.now() < parseInt(expiresAt, 10)) {
            fetchFitbitSteps(savedToken);
            updateFitbitUI(true);
          } else {
            // トークン期限切れの場合は削除
            localStorage.removeItem("fitbit_access_token");
            localStorage.removeItem("fitbit_expires_at");
            updateFitbitUI(false);
          }
        }
        
        // 連携ボタンのイベント
        document.getElementById("fitbitConnectBtn").addEventListener("click", connectFitbit);
        document.getElementById("fitbitDisconnectBtn").addEventListener("click", disconnectFitbit);
      }

      function connectFitbit() {
        const authUrl = `https://www.fitbit.com/oauth2/authorize?` +
          `response_type=token` +
          `&client_id=${FITBIT_CLIENT_ID}` +
          `&redirect_uri=${encodeURIComponent(FITBIT_REDIRECT_URI)}` +
          `&scope=${encodeURIComponent(FITBIT_SCOPES)}` +
          `&expires_in=604800`; // 7日間
        
        window.location.href = authUrl;
      }

      function disconnectFitbit() {
        poinaviConfirm("Fitbit連携を解除しますか？").then(ok => {
          if (!ok) return;
          localStorage.removeItem("fitbit_access_token");
          localStorage.removeItem("fitbit_expires_at");
          document.getElementById("stepsValue").textContent = "--";
          updateFitbitUI(false);
        });
      }

      function updateFitbitUI(isConnected) {
        const overlay = document.getElementById("fitbitOverlay");
        const disconnectArea = document.getElementById("fitbitDisconnectArea");
        
        if (isConnected) {
          // オーバーレイを非表示、解除ボタンを表示
          overlay.classList.add("hidden");
          disconnectArea.classList.remove("hidden");
        } else {
          // オーバーレイを表示、解除ボタンを非表示
          overlay.classList.remove("hidden");
          disconnectArea.classList.add("hidden");
        }
      }

      async function fetchFitbitSteps(accessToken) {
        const stepsEl = document.getElementById("stepsValue");
        
        try {
          const today = getTodayKey();
          const response = await fetch(
            `https://api.fitbit.com/1/user/-/activities/date/${today}.json`,
            {
              headers: {
                "Authorization": `Bearer ${accessToken}`
              }
            }
          );
          
          if (!response.ok) {
            if (response.status === 401) {
              // トークン無効
              localStorage.removeItem("fitbit_access_token");
              localStorage.removeItem("fitbit_expires_at");
              updateFitbitUI(false);
              stepsEl.textContent = "再連携必要";
              return;
            }
            throw new Error(`HTTP ${response.status}`);
          }
          
          const data = await response.json();
          const steps = data.summary?.steps || 0;
          stepsEl.textContent = `${steps.toLocaleString()}歩`;
          
        } catch (error) {
          console.error("Fitbit歩数取得エラー:", error);
          stepsEl.textContent = "取得失敗";
        }
      }

      // ============================================
      // 初期化
      // ============================================
      document.addEventListener("DOMContentLoaded", function() {
        initTheme();
        initStartPageSelect();
        initLabRipple();
        initSettingsModal();
        initThemeToggle();
        
        // 時刻更新
        updateDateTime();
        setInterval(updateDateTime, 1000);
        
        // 天気取得
        fetchWeather();
        setInterval(fetchWeather, 600000);
        
        // 移動距離
        initDistanceTracking();
        
        // Fitbit連携
        initFitbit();
      });

      // 他ページから戻ったとき（bfcache復元等）もテーマを再適用
      window.addEventListener("pageshow", function(e) {
        if (e.persisted) {
          var theme = localStorage.getItem("poirobo_theme") || "light";
          document.documentElement.className = theme === "dark" ? "dark-mode" : "light-mode";
          document.body.className = "lab-page " + (theme === "dark" ? "dark-mode" : "light-mode");
          updateThemeButton(theme);
        }
      });
    </script>
