    <script>
      // 起動ページリダイレクト（DOMContentLoadedより前に実行）
      (function() {
        // referrerがある場合（他のページから遷移）はリダイレクトしない
        if (document.referrer && document.referrer.includes("/poinavi/")) return;
        
        // URLにfromパラメータがある場合（フッターからの遷移）はリダイレクトしない
        var urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has("from")) return;
        
        var startPage = localStorage.getItem("poinavi_start_page") || "index.html";
        
        // 起動ページがメモ以外の場合のみリダイレクト
        if (startPage !== "index.html") {
          window.location.replace("./" + startPage);
        }
      })();

      // テーマ初期化
      function initTheme() {
        const savedTheme = localStorage.getItem("poinavi_theme") || "light";
        const isDark = savedTheme === "dark";
        document.body.classList.toggle("dark-mode", isDark);
        document.body.classList.toggle("light-mode", !isDark);
        updateThemeButton();
      }

      function updateThemeButton() {
        const themeToggle = document.getElementById("memoThemeToggle");
        if (!themeToggle) return;

        const isDark = document.body.classList.contains("dark-mode");
        const icon = themeToggle.querySelector(".theme-icon");
        const text = themeToggle.querySelector(".theme-text");

        if (icon) icon.textContent = isDark ? "🌙" : "☀️";
        if (text) text.textContent = isDark ? "ダークモード" : "ライトモード";
      }

      // 起動ページ設定を初期化
      function initStartPageSelect() {
        const select = document.getElementById("memoStartPageSelect");
        if (!select) return;

        // 保存された値を読み込み
        const savedStartPage = localStorage.getItem("poinavi_start_page") || "index.html";
        select.value = savedStartPage;

        // 変更時に保存
        select.addEventListener("change", function() {
          localStorage.setItem("poinavi_start_page", this.value);
        });
      }

      // 設定モーダル
      function initSettingsModal() {
        const modal = document.getElementById("memoSettingsModal");
        const openBtn = document.getElementById("memoSettingsButton");
        const closeBtn = document.getElementById("memoSettingsClose");
        const overlay = modal?.querySelector(".translate-modal__overlay");

        if (!modal || !openBtn || !closeBtn) return;

        openBtn.addEventListener("click", function() {
          modal.classList.remove("hidden");
          // 履歴に状態を追加（Android戻るボタン対応）
          history.pushState({ modal: "memoSettings" }, "");
        });

        closeBtn.addEventListener("click", function() {
          modal.classList.add("hidden");
        });

        if (overlay) {
          overlay.addEventListener("click", function() {
            modal.classList.add("hidden");
          });
        }
        
        // Android戻るボタン対応（popstateイベント）
        window.addEventListener("popstate", function(event) {
          // 設定モーダルが開いている場合は閉じる
          if (modal && !modal.classList.contains("hidden")) {
            modal.classList.add("hidden");
            return;
          }
        });
      }

      // テーマ切り替え
      function initThemeToggle() {
        const themeToggle = document.getElementById("memoThemeToggle");
        if (!themeToggle) return;

        themeToggle.addEventListener("click", function() {
          const isDark = document.body.classList.contains("dark-mode");
          if (isDark) {
            document.body.classList.remove("dark-mode");
            document.body.classList.add("light-mode");
            document.documentElement.classList.remove("dark-mode");
            document.documentElement.classList.add("light-mode");
            localStorage.setItem("poinavi_theme", "light");
          } else {
            document.body.classList.remove("light-mode");
            document.body.classList.add("dark-mode");
            document.documentElement.classList.remove("light-mode");
            document.documentElement.classList.add("dark-mode");
            localStorage.setItem("poinavi_theme", "dark");
          }
          updateThemeButton();
        });
      }

      // ============================================
      // メモ機能
      // ============================================
      const MEMO_STORAGE_KEY = "poinavi_memos";

      // メモを取得
      function getMemos() {
        try {
          const data = localStorage.getItem(MEMO_STORAGE_KEY);
          return data ? JSON.parse(data) : [];
        } catch (e) {
          console.error("メモの読み込みに失敗:", e);
          return [];
        }
      }

      // メモを保存
      function saveMemos(memos) {
        try {
          localStorage.setItem(MEMO_STORAGE_KEY, JSON.stringify(memos));
        } catch (e) {
          console.error("ラボノートの保存に失敗:", e);
          poinaviAlert("ラボノートの保存に失敗しました。ストレージ容量を確認してください。");
        }
      }

      // メモの上限
      const MEMO_MAX_COUNT = 50;
      const MEMO_MAX_LENGTH = 2000; // 1メモあたりの最大文字数

      // メモを追加
      function addMemo(content) {
        if (!content || !content.trim()) return false;

        const memos = getMemos();
        
        // 上限チェック
        if (memos.length >= MEMO_MAX_COUNT) {
          poinaviAlert("上限（" + MEMO_MAX_COUNT + "件）に達しています。\n不要なラボノートを整理して再度追加してください。");
          return false;
        }
        
        // 文字数チェック
        const trimmedContent = content.trim();
        if (trimmedContent.length > MEMO_MAX_LENGTH) {
          poinaviAlert("ラボノートは" + MEMO_MAX_LENGTH + "文字以内で入力してください。\n現在: " + trimmedContent.length + "文字");
          return false;
        }

        const newMemo = {
          id: Date.now().toString(),
          content: trimmedContent,
          createdAt: new Date().toISOString()
        };
        memos.unshift(newMemo); // 新しいメモを先頭に追加
        
        // LocalStorage容量チェック
        if (!checkStorageQuota()) {
          return false;
        }
        
        saveMemos(memos);
        poinaviAlert("ラボノートに追加しました");
        return true;
      }
      
      // LocalStorage容量チェック
      function checkStorageQuota() {
        try {
          const used = new Blob(Object.values(localStorage)).size;
          const limit = 5 * 1024 * 1024; // 5MB（一般的な上限）
          const usage = (used / limit) * 100;
          
          if (usage > 90) {
            poinaviAlert("ストレージ容量が残り少なくなっています。\n不要なラボノートを削除してください。");
          }
          return true;
        } catch (e) {
          return true; // エラー時は続行
        }
      }

      // メモを削除
      function deleteMemo(id) {
        const memos = getMemos();
        const index = memos.findIndex(m => m.id === id);
        if (index !== -1) {
          memos.splice(index, 1);
          saveMemos(memos);
          return true;
        }
        return false;
      }

      // 日時をフォーマット
      function formatDateTime(isoString) {
        const date = new Date(isoString);
        const month = date.getMonth() + 1;
        const day = date.getDate();
        const hours = date.getHours().toString().padStart(2, "0");
        const minutes = date.getMinutes().toString().padStart(2, "0");
        return `${month}/${day} ${hours}:${minutes}`;
      }

      // メモリストを描画
      function renderMemoList() {
        const memoList = document.getElementById("memoList");
        const memoEmpty = document.getElementById("memoEmpty");
        const memos = getMemos();

        // 既存のメモアイテムをクリア（プレースホルダー以外）
        const existingItems = memoList.querySelectorAll(".memo-item");
        existingItems.forEach(item => item.remove());

        if (memos.length === 0) {
          memoEmpty.style.display = "flex";
          return;
        }

        memoEmpty.style.display = "none";

        memos.forEach(memo => {
          const memoItem = document.createElement("div");
          memoItem.className = "memo-item";
          memoItem.dataset.id = memo.id;

          const formattedTime = formatDateTime(memo.createdAt);
          memoItem.innerHTML = `
            <div class="memo-item__header">
              <span class="memo-item__time">${formattedTime}</span>
              <button class="memo-item__delete" type="button" aria-label="削除" data-id="${memo.id}" data-time="${formattedTime}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  <line x1="10" y1="11" x2="10" y2="17"></line>
                  <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
              </button>
            </div>
            <div class="memo-item__content">${linkifyUrls(memo.content)}</div>
          `;

          memoList.appendChild(memoItem);
        });

        // 削除ボタンのイベント設定
        memoList.querySelectorAll(".memo-item__delete").forEach(btn => {
          btn.addEventListener("click", function() {
            const id = this.dataset.id;
            const time = this.dataset.time;
            poinaviConfirm(`[${time}] のラボノートを削除しますか？`).then(ok => {
              if (ok) {
                deleteMemo(id);
                renderMemoList();
              }
            });
          });
        });
      }

      // HTMLエスケープ
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }
      
      // URLをリンク化
      function linkifyUrls(text) {
        // まずHTMLエスケープ
        const escaped = escapeHtml(text);
        // URLパターンを検出してリンク化
        const urlPattern = /(https?:\/\/[^\s<>"']+)/g;
        return escaped.replace(urlPattern, '<a href="$1" target="_blank" rel="noopener noreferrer" class="memo-link">$1</a>');
      }

      // メモ入力の初期化
      function initMemoInput() {
        const input = document.getElementById("memoInput");
        const addBtn = document.getElementById("memoAddBtn");

        if (!input || !addBtn) return;

        // 入力モード時はフッター・警告を非表示（スマホキーボード表示時）
        function onInputFocus() {
          document.body.classList.add("input-mode");
          if (/Android/i.test(navigator.userAgent)) {
            history.pushState({ inputMode: true }, "", window.location.href);
          }
        }
        function onInputBlur() { document.body.classList.remove("input-mode"); }
        input.addEventListener("focus", onInputFocus);
        input.addEventListener("blur", onInputBlur);

        // Android戻るボタン：フォーカスを外してメニュー表示に戻す
        if (/Android/i.test(navigator.userAgent)) {
          window.addEventListener("popstate", function() {
            if (document.activeElement === input) {
              input.blur();
            }
          });
        }

        // 追加ボタンクリック
        addBtn.addEventListener("click", function() {
          if (addMemo(input.value)) {
            input.value = "";
            input.blur();
            renderMemoList();
          }
        });

        // Enterキー（Ctrl/Cmd + Enter）で追加
        input.addEventListener("keydown", function(e) {
          if ((e.ctrlKey || e.metaKey) && (e.key === "Enter" || e.keyCode === 13)) {
            e.preventDefault();
            if (addMemo(input.value)) {
              input.value = "";
              input.blur();
              renderMemoList();
            }
          }
        });
      }

      // 設定初期化
      function initResetButton() {
        const resetBtn = document.getElementById("memoResetBtn");
        if (!resetBtn) return;

        resetBtn.addEventListener("click", function() {
          poinaviConfirm("すべての設定を初期化しますか？\n（テーマ、起動ページなどがリセットされます。ラボノートは保持されます）").then(ok => {
            if (!ok) return;
            localStorage.removeItem("poinavi_theme");
            localStorage.removeItem("poinavi_start_page");
            poinaviAlert("設定を初期化しました。ページを再読み込みします。");
            location.reload();
          });
        });
      }

      // 初期化
      document.addEventListener("DOMContentLoaded", function() {
        initTheme();
        initSettingsModal();
        initThemeToggle();
        initStartPageSelect();
        initMemoInput();
        initResetButton();
        renderMemoList();
      });
    </script>
  </body>
</html>
