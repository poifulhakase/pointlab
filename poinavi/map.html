    <!-- FOUC対策: CSSロード前にテーマを適用 -->
    <script>
      (function() {
        var theme = localStorage.getItem("poinavi_theme") || "light";
        var themeClass = theme === "dark" ? "dark-mode" : "light-mode";
        document.documentElement.className = themeClass;
        // bodyにも適用（DOMContentLoaded前でも動作するように）
        document.addEventListener("DOMContentLoaded", function() {
          document.body.classList.add(themeClass);
        });
      })();
    </script>
    <style>
      /* FOUC対策: 初期背景色 */
      html.light-mode { background-color: #f5f5f7; }
      html.dark-mode { background-color: #1a1a1a; }

      @media (min-width: 501px) {

        html, html.dark-mode {

    <!-- Google Maps API -->
    <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDA62Ge5UHqpZOFQhMhVSvQI_xWABrftL0&libraries=places,geometry&callback=initGoogleMaps&loading=async"
      async
    ></script>
    <script>
      // Google Maps API の読み込みエラーハンドリング
      window.gm_authFailure = function() {
        showMapError("Google Maps API の認証に失敗しました。APIキーを確認してください。");
      };

      // APIキーチェック
      function checkApiKey() {
        const scriptTag = document.querySelector('script[src*="maps.googleapis.com"]');
        if (scriptTag && scriptTag.src.includes('YOUR_GOOGLE_MAPS_API_KEY')) {
          showMapError(
            "Google Maps API キーが設定されていません。\n\n" +
            "map.html の14行目付近の YOUR_GOOGLE_MAPS_API_KEY を実際のAPIキーに置き換えてください。\n\n" +
            "APIキーの取得方法:\n" +
            "1. https://console.cloud.google.com/ にアクセス\n" +
            "2. プロジェクトを作成\n" +
            "3. Maps JavaScript API と Places API を有効化\n" +
            "4. API キーを取得して設定"
          );
          return false;
        }
        return true;
      }

      function showMapError(message) {
        const mapContainer = document.getElementById("map");
        if (mapContainer) {
          mapContainer.innerHTML = `
            <div style="
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              height: 100%;
              padding: 20px;
              text-align: center;
              background-color: #f5f5f5;
              color: #d32f2f;
            ">
              <div style="font-size: 48px; margin-bottom: 16px;">⚠️</div>
              <div style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">マップの読み込みエラー</div>
              <div style="font-size: 14px; line-height: 1.6; white-space: pre-line;">${message}</div>
            </div>
          `;
        }
      }

      // ページ読み込み時にAPIキーをチェック
      window.addEventListener("DOMContentLoaded", function() {
        setTimeout(function() {
          if (typeof google === "undefined" || typeof google.maps === "undefined") {
            if (!checkApiKey()) {
              return;
            }
            showMapError(
              "Google Maps API が読み込めませんでした。\n\n" +
              "考えられる原因:\n" +
              "・APIキーが正しく設定されていない\n" +
              "・Maps JavaScript API が有効化されていない\n" +
              "・ネットワーク接続の問題\n\n" +
              "ブラウザのコンソール（F12）でエラー詳細を確認してください。"
            );
          }
        }, 2000); // 2秒後にチェック
      });
    </script>

  <body>
    <!-- 長押しコンテキストメニュー無効化 -->
    <script>
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    </script>

    <!-- 設定モーダル -->
    <div id="settingsModal" class="settings-modal hidden">
      <div class="settings-modal__overlay" onclick="hideSettingsModal();"></div>
      <div class="settings-modal__content">
        <div class="settings-modal__header">

              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="settings-modal__body">
          <!-- タグ管理 -->

            <label class="settings-modal__label">タグ管理</label>
            
            <!-- タグ追加フォーム -->
            <div class="tag-add-form">
              <input 
                type="text" 
                id="newTagInput" 
                class="tag-add-form__input" 
                placeholder="新しいタグ名"
                maxlength="20"
                enterkeyhint="done"
                autocomplete="off"
              />
              <button id="addTagButton" class="tag-add-form__button" type="button" onclick="handleAddTag();">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                追加
              </button>
            </div>
            
            <!-- タグ一覧（削除可能） -->
            <div class="tag-manage-list" id="tagManageList">
              <!-- JavaScriptで動的に生成 -->
            </div>
          </div>
          
          <!-- 移動手段 -->
          <div class="settings-modal__item">
            <label class="settings-modal__label">移動手段</label>
            <div class="transport-mode-buttons">
              <button type="button" class="transport-mode-btn active" data-mode="walk" onclick="selectTransportMode(this, 'walk');">
                🚶 徒歩
              </button>
              <button type="button" class="transport-mode-btn" data-mode="bicycle" onclick="selectTransportMode(this, 'bicycle');">
                🚲 自転車
              </button>
              <button type="button" class="transport-mode-btn" data-mode="car" onclick="selectTransportMode(this, 'car');">
                🚗 車
              </button>
            </div>
          </div>
          
          <!-- 表示件数 -->
          <div class="settings-modal__item">
            <label class="settings-modal__label">表示件数</label>
            <select id="resultCount" class="settings-modal__select">
              <option value="3" selected>3件</option>
              <option value="4">4件</option>
              <option value="5">5件</option>
            </select>
          </div>

          <!-- 案内 -->

            <p style="font-size: 0.875rem; color: var(--text-secondary); margin: 0; line-height: 1.6;">

            </p>

        </div>

    <!-- 1️⃣ マップ表示（上部） -->

      <h1 class="visually-hidden">ぽいナビ - 地図：周辺検索・駅・公共トイレ</h1>
      <!-- 設定ボタン（右上フロート） -->
      <button id="mapSettingsButton" class="map-settings-button" type="button" aria-label="設定" onclick="showSettingsModal();">

          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>

      <div class="map-container">
        <div id="map" class="map"></div>
        
        
        <!-- 現在地取得中ローディングオーバーレイ -->
        <div id="locationLoadingOverlay" class="location-loading-overlay hidden">
          <div class="location-loading-overlay__content">
            <div class="location-loading-overlay__spinner"></div>
            <p class="location-loading-overlay__text">現在地取得中...</p>
          </div>
        </div>
        <!-- 路線ローディングオーバーレイ -->
        <div id="railwayLoadingOverlay" class="railway-loading-overlay hidden">
          <div class="railway-loading-overlay__content">
            <div class="railway-loading-overlay__spinner"></div>
            <p class="railway-loading-overlay__text">路線情報を取得中...</p>
          </div>
        </div>
        
        <!-- レイヤーコントロール（左上フロート） -->
        <div class="layer-control">
          <!-- お手洗いトグル -->
          <div class="layer-control__row">
            <button 
              id="toiletToggle" 
              class="layer-toggle" 
              type="button"
              aria-pressed="false"
              aria-label="お手洗い表示切替"
            >
              <svg class="layer-toggle__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <!-- 男性（左） -->
                <circle cx="7" cy="4" r="2"></circle>
                <path d="M7 8v6M7 14l-2 6M7 14l2 6M4 10h6"></path>
                <!-- 女性（右） -->
                <circle cx="17" cy="4" r="2"></circle>
                <path d="M17 8l-2 6h4l-2-6zM15 20v-4M19 20v-4"></path>
              </svg>
              <span class="layer-toggle__text">トイレ</span>
            </button>
            <!-- お手洗いON時のステータス -->
            <div id="toiletStatus" class="layer-status layer-status--inline hidden">
              <span class="layer-status__text">表示中（半径2km）</span>
            </div>
            <!-- お手洗いローディング中のステータス -->
            <div id="toiletLoading" class="layer-status layer-status--inline layer-status--loading hidden">

                <circle cx="12" cy="12" r="10" stroke-dasharray="31.4 31.4" stroke-linecap="round"></circle>
              </svg>
              <span class="layer-status__text">取得中...</span>
            </div>
          </div>
          
          <!-- 鉄道レイヤートグル -->
          <div class="layer-control__row">
            <button 
              id="railwayToggle" 
              class="layer-toggle" 
              type="button"
              aria-pressed="false"
              aria-label="鉄道路線切替"
            >
              <svg class="layer-toggle__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <!-- 電車の車体 -->
                <path d="M4 11h14a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2z"></path>
                <!-- 先頭部分 -->
                <path d="M20 13l2-1v4l-2-1"></path>
                <!-- 窓 -->
                <rect x="4" y="13" width="3" height="2" rx="0.5"></rect>
                <rect x="9" y="13" width="3" height="2" rx="0.5"></rect>
                <rect x="14" y="13" width="3" height="2" rx="0.5"></rect>
                <!-- 車輪 -->
                <circle cx="6" cy="19" r="1.5"></circle>
                <circle cx="16" cy="19" r="1.5"></circle>
                <!-- レール -->
                <line x1="1" y1="21" x2="23" y2="21"></line>
              </svg>
              <span class="layer-toggle__text">路線</span>
            </button>
            <!-- 鉄道ON時のステータス -->
            <div id="railwayStatus" class="layer-status layer-status--inline hidden">
              <span class="layer-status__text">表示中（半径8km）</span>
            </div>
            <!-- 鉄道ローディング中のステータス -->
            <div id="railwayLoading" class="layer-status layer-status--inline layer-status--loading hidden">
              <svg class="layer-status__spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" stroke-dasharray="31.4 31.4" stroke-linecap="round"></circle>
              </svg>
              <span class="layer-status__text">路線取得中...</span>
            </div>
          </div>
          
          <!-- 雨雲レーダートグル -->
          <div class="layer-control__row">
            <button 
              id="rainViewerToggle" 
              class="layer-toggle" 
              type="button"
              aria-pressed="false"
              aria-label="雨雲レーダー切替"
            >
              <svg class="layer-toggle__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 17.58A5 5 0 0 0 18 8h-1.26A8 8 0 1 0 4 16.25"></path>
                <line x1="8" y1="16" x2="8.01" y2="16"></line>
                <line x1="8" y1="20" x2="8.01" y2="20"></line>
                <line x1="12" y1="18" x2="12.01" y2="18"></line>
                <line x1="12" y1="22" x2="12.01" y2="22"></line>
                <line x1="16" y1="16" x2="16.01" y2="16"></line>
                <line x1="16" y1="20" x2="16.01" y2="20"></line>
              </svg>
              <span class="layer-toggle__text">雨雲</span>
            </button>
            <!-- 雨雲ON時のステータス -->

              <span class="layer-status__text">表示中</span>
            </div>
            <!-- 雨雲ローディング中 -->
            <div id="rainViewerLoading" class="layer-status layer-status--inline layer-status--loading hidden">
              <svg class="layer-status__spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" stroke-dasharray="31.4 31.4" stroke-linecap="round"></circle>
              </svg>
              <span class="layer-status__text">取得中...</span>
            </div>
          </div>
          
        </div>
        
        
        <!-- トップ3～5件リスト（距離順） -->
        <div class="results-list" id="resultsList" style="display: none;"></div>
      </div>
    </main>
