<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ぽいロボ - 博士と接続 (環境エフェクト統合版)</title>
<style>
  * { box-sizing: border-box; }

  :root {
    --poyon-cyan: #00f2ff;
    --poyon-white: #f0f8ff;
    --glow-shadow: rgba(0, 242, 255, 0.4);
    --bg-dark: #081015;
    --core-dark: #080c10;
    --hud-bg: rgba(0, 25, 35, 0.95);
  }

  body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background-color: var(--bg-dark);
    background-image: url('{22ED0A3A-C8CD-4582-8E08-733BDF3099B1}.jpg'); 
    background-size: cover;
    background-position: center;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
  }

  /* --- 1. 環境エフェクト (統合) --- */
  .dust-container { position: fixed; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
  .dust { position: absolute; width: 2px; height: 2px; background: var(--poyon-cyan); border-radius: 50%; opacity: 0; animation: digital-dust 10s linear infinite; }
  @keyframes digital-dust {
    0% { transform: translateY(0); opacity: 0; }
    20% { opacity: 0.4; }
    100% { transform: translateY(-150px); opacity: 0; }
  }
  .scanline { position: fixed; width: 100%; height: 15px; background: linear-gradient(to bottom, transparent, rgba(0, 242, 255, 0.05), transparent); z-index: 2; pointer-events: none; animation: scanline-move 8s linear infinite; }
  @keyframes scanline-move { 0% { top: -100px; } 100% { top: 110%; } }

  /* --- 2. メインキャンバス --- */
  .hud-canvas {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10; /* エフェクトより前面へ */
  }

  /* --- 3. ボタン本体 --- */
  .poyon-connect-area {
    position: relative;
    width: clamp(180px, 45vw, 250px);
    height: clamp(180px, 45vw, 250px);
    display: flex; justify-content: center; align-items: center;
    cursor: pointer;
    z-index: 100;
    -webkit-tap-highlight-color: transparent;
  }

  .scanner-ring {
    position: absolute; width: 110%; height: 110%;
    border: 1px solid rgba(0, 242, 255, 0.1); border-radius: 50%;
    animation: slow-rotate 15s linear infinite;
    pointer-events: none;
  }

  .main-core {
    position: relative; width: 90%; height: 90%;
    background: rgba(8, 12, 16, 0.95);
    border: 1px solid rgba(0, 242, 255, 0.4); border-radius: 50%;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    box-shadow: inset 0 0 25px var(--glow-shadow);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    backdrop-filter: blur(8px); overflow: hidden;
  }

  .image-mask {
    width: 35%; height: 35%; border-radius: 50%; overflow: hidden;
    margin-bottom: 5px; transform: translateY(-5px);
    background-color: var(--core-dark);
  }

  .doctor-image { width: auto; height: 110%; filter: sepia(1) hue-rotate(150deg) saturate(1.2) brightness(0.7) contrast(1.1); transition: 0.4s ease; opacity: 0.8; }

  .text-wrapper { display: flex; flex-direction: column; align-items: center; text-align: center; }
  .text-main { font-size: clamp(14px, 4vw, 19px); font-weight: 900; color: var(--poyon-white); text-shadow: 0 0 10px var(--poyon-cyan); }
  .text-sub { font-size: clamp(8px, 2vw, 10px); color: var(--poyon-cyan); font-weight: bold; margin-top: 4px; }

  /* --- 4. HUD演出要素 --- */
  .hud-line-connector {
    position: absolute; top: 50%; left: 50%;
    width: 0; height: 1px; background: var(--poyon-cyan);
    transform-origin: 0 0;
    transform: rotate(-135deg) translate(clamp(90px, 22vw, 120px), 0);
    z-index: 50; box-shadow: 0 0 8px var(--poyon-cyan);
    transition: width 0.3s ease-out;
    pointer-events: none;
  }

  .hud-panel-frame {
    position: absolute;
    bottom: calc(50% + clamp(120px, 25vw, 160px)); 
    right: calc(50% + 120px);
    width: 300px;
    padding: 18px;
    background: var(--hud-bg);
    border: 1px solid rgba(0, 242, 255, 0.3);
    backdrop-filter: blur(12px);
    z-index: 40;
    opacity: 0;
    transform: scale(0.95);
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    pointer-events: none;
    word-break: break-all;
  }

  @media (max-width: 600px) {
    .hud-line-connector { transform: rotate(-90deg) translate(clamp(100px, 25vw, 130px), 0); }
    .hud-panel-frame {
      width: 90vw; max-width: 320px; right: 50%;
      transform: translateX(50%) scale(0.95);
      bottom: calc(50% + clamp(120px, 30vw, 160px));
    }
    .poyon-connect-area:hover ~ .hud-panel-frame { transform: translateX(50%) scale(1); }
  }

  .hud-panel-frame::before { content: ''; position: absolute; top: -1px; left: -1px; width: 30px; height: 30px; border-top: 3px solid var(--poyon-cyan); border-left: 3px solid var(--poyon-cyan); }
  .panel-node { position: absolute; width: 8px; height: 8px; background: var(--bg-dark); border: 2px solid var(--poyon-cyan); border-radius: 50%; bottom: -5px; right: -5px; }
  .hud-label { display: block; font-size: 9px; color: var(--poyon-cyan); font-weight: bold; letter-spacing: 0.15em; margin-bottom: 8px; border-bottom: 1px solid rgba(0, 242, 255, 0.2); padding-bottom: 4px; }
  .hud-text { font-size: 12px; color: var(--poyon-white); line-height: 1.6; }
  .hud-status { font-size: 10px; color: var(--poyon-cyan); opacity: 0.8; margin-top: 6px; display: block; }

  /* --- 5. インタラクション --- */
  .poyon-connect-area:hover ~ .hud-line-connector { width: clamp(40px, 12vw, 70px); }
  .poyon-connect-area:hover ~ .hud-panel-frame { opacity: 1; }

  .poyon-connect-area:hover .main-core {
    transform: scale(1.05);
    border-color: var(--poyon-cyan);
    box-shadow: 0 0 30px var(--glow-shadow), inset 0 0 20px var(--glow-shadow);
  }

  .poyon-connect-area:hover .text-wrapper { animation: text-subtle-poyon 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
  .poyon-connect-area:hover .doctor-image { filter: sepia(1) hue-rotate(150deg) saturate(1.6) brightness(0.9) contrast(1.1); opacity: 1; transform: scale(1.05); }

  .poyon-connect-area:active .main-core {
    transform: scale(0.92) translateY(3px);
    filter: brightness(1.2);
    transition: 0.1s; 
  }

  @keyframes text-subtle-poyon {
    0% { transform: translateY(0) scale(1); }
    40% { transform: translateY(-4px) scale(1.03); }
    70% { transform: translateY(1px) scale(0.99); }
    100% { transform: translateY(0) scale(1); }
  }

  @keyframes slow-rotate { to { transform: rotate(360deg); } }
</style>
</head>
<body>

  <div class="dust-container">
    <div class="dust" style="top: 70%; left: 20%; animation-delay: 0s;"></div>
    <div class="dust" style="top: 40%; left: 80%; animation-delay: 2s;"></div>
    <div class="dust" style="top: 80%; left: 65%; animation-delay: 1s;"></div>
    <div class="dust" style="top: 20%; left: 30%; animation-delay: 3s;"></div>
  </div>
  <div class="scanline"></div>

  <div class="hud-canvas">
    <div class="poyon-connect-area" onclick="console.log('Sync Protocol Initiated...');">
      <div class="scanner-ring"></div>
      <div class="main-core">
        <div class="image-mask">
          <img src="poifulhakase_face_smile.png" class="doctor-image" alt="博士" draggable="false">
        </div>
        <div class="text-wrapper">
          <div class="text-main">ぽいロボ コネクト</div>
          <div class="text-sub">ぽいふる博士と接続</div>
        </div>
      </div>
    </div>

    <div class="hud-line-connector"></div>

    <div class="hud-panel-frame">
      <span class="hud-label">POIROBO_CONNECT_v2.0</span>
      <div class="hud-text">
        博士と音声通話・画面共有ができます。
        <span class="hud-status">接続プロトコル：SECURE_SYNC</span>
      </div>
      <div class="panel-node"></div>
    </div>
  </div>

</body>
</html>
