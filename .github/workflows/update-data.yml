name: Update Market Data

on:
  schedule:
    # 木曜 15:30 JST (06:30 UTC) — 投資主体別売買動向
    - cron: '30 6 * * 4'
    # 金曜 18:00 JST (09:00 UTC) — 信用倍率
    - cron: '0 9 * * 5'
    # 月曜 09:00 JST (00:00 UTC) — VIX週次
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 手動実行も可能

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest market data
        run: npm run fetch-data

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet public/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git commit -m "chore: update market data [skip ci]"
          git push

      # Vercel は GitHub 連携により、push をトリガーに自動デプロイ
