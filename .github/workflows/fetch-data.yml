name: データ自動更新

on:
  schedule:
    # 火曜 18:30 JST (09:30 UTC): 月曜分の先物日次データ取得
    - cron: '30 9 * * 2'
    # 水曜 18:00 JST (09:00 UTC): JPX信用残高・裁定残高（水曜16時公表の2h後）
    - cron: '0 9 * * 3'
    # 木曜 18:30 JST (09:30 UTC): 水曜分の先物日次データ取得
    - cron: '30 9 * * 4'
    # 金曜 18:30 JST (09:30 UTC): 木曜分の先物日次データ取得
    - cron: '30 9 * * 5'
    # 土曜 09:00 JST (00:00 UTC): COT・週次データ締め後（金曜分も取得）
    - cron: '0 0 * * 6'
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 依存関係インストール
        run: npm ci

      - name: データ取得
        run: npm run fetch-data
        continue-on-error: true

      - name: 変更チェック & コミット
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "データに変更なし。スキップします。"
          else
            git commit -m "chore: データ自動更新 $(date '+%Y-%m-%d')"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Vercel デプロイ
        if: steps.commit.outputs.changed == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel --prod --token "$VERCEL_TOKEN"
