name: データ自動更新

on:
  schedule:
    # 各実行は fetch-jpx.mjs が全データソースを一括取得する（前営業日分を翌営業日に最新化）。
    # 鮮度方針：平日は毎日2回走らせ、前営業日分を確実に取得＋Yahoo等の一時的な欠損(穴)を再取得で補完。
    #   月曜の実行で金曜分（JPXは翌営業日=月曜公表）も拾えるため、旧スケジュールの「金曜分が火曜まで来ない」穴を解消。
    # 月〜金 19:30 JST (10:30 UTC): JPX日報(前営業日分・公表16:31〜17:00)の後に取得
    - cron: '30 10 * * 1-5'
    # 月〜金 21:30 JST (12:30 UTC): 保険。1回目がGitHub側で遅延/スキップされた場合や、
    #   Yahoo等の遅れて埋まる欠損を再取得（変更が無ければコミットしないので無害）
    - cron: '30 12 * * 1-5'
    # 土曜 09:00 JST (00:00 UTC): 週次COT（CFTC金曜20:30UTC公表後）・週次集計・バックテスト再計算・更新通知
    - cron: '0 0 * * 6'
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 依存関係インストール
        run: npm ci

      - name: データ取得
        run: npm run fetch-data
        continue-on-error: true

      - name: バックテスト再計算（土曜のみ）
        if: github.event_name == 'schedule' && contains(github.event.schedule, '0 0 * * 6')
        run: npm run backtest
        continue-on-error: true

      - name: 変更チェック & コミット
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # フレッシュデータを一時退避
          cp -r public/data/ /tmp/fresh_data

          # リモート最新に強制同期（コンフリクト根絶）
          git fetch origin main
          git reset --hard origin/main

          # フレッシュデータを上書き
          cp -r /tmp/fresh_data/. public/data/

          git add public/data/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "データに変更なし。スキップします。"
          else
            git commit -m "chore: データ自動更新 $(date '+%Y-%m-%d')"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # 本番デプロイは Vercel の GitHub 連携が main への push をトリガーに自動実行する。
      # （以前はここで明示的に `vercel --prod` を実行していたが、Git連携と二重になり
      #  かつ失敗時に本番へ届かない原因になっていたため撤去。コミットに [skip ci] を
      #  付けないこと＝付けると Vercel 連携デプロイもスキップされる。）

      - name: データ鮮度チェック
        id: freshness_check
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const today = new Date();
          const todayStr = today.toISOString().slice(0, 10);
          let hasWarning = false;

          function daysDiff(dateStr) {
            const d = new Date(dateStr.replace(/\//g, '-'));
            return Math.floor((today - d) / 86400000);
          }

          // futures_daily チェック（直近4営業日以内）
          try {
            const fd = JSON.parse(fs.readFileSync('public/data/futures_daily.json', 'utf8'));
            const arr = Array.isArray(fd) ? fd : fd.data;
            const latest = arr[0]?.date;
            const diff = latest ? daysDiff(latest) : 999;
            if (diff > 4) {
              console.warn('⚠ futures_daily が古い: 最新=' + latest + ' (' + diff + '日前)');
              hasWarning = true;
            } else {
              console.log('✓ futures_daily: 最新=' + latest + ' (' + diff + '日前)');
            }
          } catch(e) { console.warn('⚠ futures_daily 読込エラー:', e.message); hasWarning = true; }

          // investor チェック（直近10日以内）
          try {
            const inv = JSON.parse(fs.readFileSync('public/data/investor.json', 'utf8'));
            const arr = Array.isArray(inv) ? inv : inv.data;
            const latest = arr[0]?.date;
            const diff = latest ? daysDiff(latest) : 999;
            if (diff > 10) {
              console.warn('⚠ investor が古い: 最新=' + latest + ' (' + diff + '日前)');
              hasWarning = true;
            } else {
              console.log('✓ investor: 最新=' + latest + ' (' + diff + '日前)');
            }
          } catch(e) { console.warn('⚠ investor 読込エラー:', e.message); hasWarning = true; }

          if (hasWarning) process.exit(1);
          "
        continue-on-error: true

      - name: データ鮮度チェック失敗通知
        if: always() && steps.freshness_check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: '⚠️ データ鮮度チェック失敗 ' + new Date().toISOString().slice(0, 10),
              body:  'データ鮮度チェックで古いデータを検出しました。\n\nワークフロー: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
              labels: ['data-stale'],
            });

      - name: データ更新通知を送信（土曜のみ・成功時）
        if: success() && github.event_name == 'schedule' && contains(github.event.schedule, '0 0 * * 6')
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST https://pointlab.vercel.app/api/notify-data-ready \
            -H "x-notify-secret: ${{ secrets.NOTIFY_SECRET }}"
