name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 依存関係インストール
        run: npm ci

      - name: 型チェック
        run: npx tsc --noEmit -p tsconfig.app.json

      # ★2026-05-30 エラー0件化達成によりブロッキング化。warning は許容（error のみ失敗）。
      - name: Lint
        run: npm run lint

      - name: テスト実行
        run: npm test
